<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon">
    <title>Calculadora básica</title>
</head>
<body>
    <header class="header">
        <button id="button-config" onclick="buttonclick()"><img src="img/config-azul.png" alt="botão de configurações"></button>
        <nav class="nav" id="nav">
            <ul class="navlist">
                <li><button><img src="img/historico-azul.png" alt="Histórico"></button></li>
                <li><button><img src="img/modelo-azul.png" alt="Modelos"></button></li>
                <li><button><img src="img/creditos-azul.png" alt="Créditos"></button></li>
                <li><button><img src="img/preferencias-azul.png" alt="Preferências"></button></li>
            </ul>
        </nav>
    </header>
    <main class="container">
        <h1>Projeto Calculadora</h1>

        <section class="calculadora-box">

            <div class="visor">
                <input type="text" disabled value="" id="visor">
            </div>

            <div class="botoes">
                <button onclick="digit('%')">&percnt;</button>
                <button onclick="clean()">C</button>
                <button onclick="digit('/')">&divide;</button>
                <button onclick="btnBack()">&#X232b;</button>
                <button onclick="digit('7')">7</button>
                <button onclick="digit('8')">8</button>
                <button onclick="digit('9')">9</button>
                <button onclick="digit('*')">&times;</button>
                <button onclick="digit('4')">4</button>
                <button onclick="digit('5')">5</button>
                <button onclick="digit('6')">6</button>
                <button onclick="digit('-')">&minus;</button>
                <button onclick="digit('1')">1</button>
                <button onclick="digit('2')">2</button>
                <button onclick="digit('3')">3</button>
                <button onclick="digit('+')">&plus;</button>
                <button onclick="digit('0')" class="botao-zero">0</button>
                <button onclick="digit('.')">&comma;</button>
                <button onclick="resolution()" class="btn-equal">&equals;</button>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
